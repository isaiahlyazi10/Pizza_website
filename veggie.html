<!DOCTYPE html>
<html>

<head>
  <title>Slice Pizza</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Trirong">
  <script src="https://kit.fontawesome.com/080d8acc0a.js" crossorigin="anonymous"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Trirong", serif;
  background-color: #0f0f0f;
  color: #f5f5f5;
  scroll-behavior: smooth;
}

header {
  position: sticky;
  top: 0;
  background: transparent;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
}

nav a {
  color: #f5f5f5;
  margin-left: 1.5rem;
  text-decoration: none;
  font-weight: 400px;
}

nav a:hover {
  background-color: red;
  color: white;
  padding: 14px 25px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  transition: 1s;
}

h2{
  font-size: larger;
  font-weight: 900px bolder;
  font-family:"Trirong", serif";
}

.hero {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  text-align: center;
}

.hero img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(50%);
  z-index: -1;
}

.hero-text {
  padding: 2rem;
}

.hero h2 {
  font-size: 3rem;
  margin-bottom: 1rem;
}

.hero p {
  font-size: 1.2rem;
  margin-bottom: 2rem;
}

.btn {
  background: #ff4d4d;
  color: #000;
  padding: 0.8rem 1.8rem;
  border: none;
  border-radius: 30px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #ff6666;
}


section {
  padding: 5rem 2rem;
  max-width: 1000px;
  margin: auto;
}

.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 2rem;
}

.pizza {
  background: #1a1a1a;
  padding: 2rem;
  border-radius: 15px;
  text-align: center;
}

.price {
  color: #ff4d4d;
  font-weight: 700;
}

.about {
  text-align: center;
  color: #ccc;
  display:grid;
  
}


.contact {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  align-items: center;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 1rem;
}

footer {
  background: #111;
  text-align: center;
  padding: 10px;
  color: #777;
}

.isaiah{
  background-color: grey ;
  width: 100%;

}

.bg-image{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(50%);
}

</style>
</head>
<section>

<div class="pizza">
  <img class="bg-image" src="pizza.jpg" alt="Pizza Background">
    <h4>Veggie</h4>
      <p>Peppers, olives, onions, mushrooms</p>
      <p class="price">$9.99</p>
    
    

    <button class="order-btn" onclick="orderPizza('Veggie')">Order Now </button>

    <br><br>

     <i class="fa-solid fa-seedling fa-spin" style="color: #28730d;"></i>
</div>
</section>

<footer>
  © 2026 Slice Pizza ⋅ est 2026 <br> ISAIAH MADE THIS 
  <br><br><br>
 
</footer>

</html>
